<footer class="bg-dark text-light pt-5 pb-3 mt-5">
  <div class="container">
    <div class="row gy-4">
      <div class="col-12 col-md-4">
        <h5 class="fw-bold mb-3">{{ store?.name || 'Saldos Online' }}</h5>
        <p class="text-secondary mb-1" *ngIf="store?.address"><i class="bi bi-geo-alt me-2"></i>{{ store?.address }}</p>
        <p class="text-secondary mb-1" *ngIf="store?.phone"><i class="bi bi-telephone me-2"></i>{{ store?.phone }}</p>
        <p class="text-secondary mb-1" *ngIf="store?.email"><i class="bi bi-envelope me-2"></i>{{ store?.email }}</p>
        <p class="text-secondary mb-0" *ngIf="store?.schedule"><i class="bi bi-clock me-2"></i>{{ store?.schedule }}</p>
      </div>

      <div class="col-12 col-md-4">
        <h5 class="fw-bold mb-3">Enlaces</h5>
        <ul class="list-unstyled">
          <li class="mb-2"><a class="link-light link-underline-opacity-0" routerLink="/">Inicio</a></li>
          <li class="mb-2"><a class="link-light link-underline-opacity-0" routerLink="/products">Catálogo</a></li>
          <li class="mb-2"><a class="link-light link-underline-opacity-0" routerLink="/categories">Categorías</a></li>
          <li class="mb-2"><a class="link-light link-underline-opacity-0" routerLink="/cart">Carrito</a></li>
          <li class="mb-2"><a class="link-light link-underline-opacity-0" routerLink="/contact">Contacto</a></li>
        </ul>
      </div>

      <div class="col-12 col-md-4">
        <h5 class="fw-bold mb-3">Síguenos</h5>
        <div class="d-flex gap-3 fs-4">
          <a *ngIf="store?.facebookUrl" [href]="store?.facebookUrl" target="_blank" class="link-light" aria-label="Facebook">
            <i class="bi bi-facebook"></i>
          </a>
          <a *ngIf="store?.instagramUrl" [href]="store?.instagramUrl" target="_blank" class="link-light" aria-label="Instagram">
            <i class="bi bi-instagram"></i>
          </a>
          <a *ngIf="store?.tiktokUrl" [href]="store?.tiktokUrl" target="_blank" class="link-light" aria-label="TikTok">
            <i class="bi bi-tiktok"></i>
          </a>
          <a *ngIf="store?.whatsappUrl" [href]="store?.whatsappUrl" target="_blank" class="link-light" aria-label="WhatsApp">
            <i class="bi bi-whatsapp"></i>
          </a>
        </div>
      </div>
    </div>

    <hr class="border-secondary my-4" />

    <p class="text-center text-secondary mb-0 small">
      &copy; {{ currentYear }} {{ store?.name || 'Saldos Online' }}. Todos los derechos reservados.
    </p>
  </div>
</footer>
