<footer class="footer-modern text-light pt-5 pb-3">
  <div class="container">
    <div class="row gy-4">
      <div class="col-12 col-md-4">
        <h5 class="fw-bold mb-3 d-flex align-items-center gap-2">
          <img src="/MarketFlow.png" alt="Marketflow" height="28" class="rounded" />
          {{ store?.name || 'Marketflow' }}
        </h5>
        <p class="text-secondary mb-1" *ngIf="store?.address"><i class="bi bi-geo-alt me-2"></i>{{ store?.address }}</p>
        <p class="text-secondary mb-1" *ngIf="store?.phone"><i class="bi bi-telephone me-2"></i>{{ store?.phone }}</p>
        <p class="text-secondary mb-1" *ngIf="store?.email"><i class="bi bi-envelope me-2"></i>{{ store?.email }}</p>
        <p class="text-secondary mb-0" *ngIf="store?.schedule"><i class="bi bi-clock me-2"></i>{{ store?.schedule }}</p>
      </div>

      <div class="col-12 col-md-4">
        <h5 class="fw-bold mb-3">Enlaces</h5>
        <ul class="list-unstyled footer-links">
          <li class="mb-2"><a routerLink="/">Inicio</a></li>
          <li class="mb-2"><a routerLink="/products">Catálogo</a></li>
          <li class="mb-2"><a routerLink="/categories">Categorías</a></li>
          <li class="mb-2"><a routerLink="/cart">Carrito</a></li>
          <li class="mb-2"><a routerLink="/contact">Contacto</a></li>
        </ul>
      </div>

      <div class="col-12 col-md-4">
        <h5 class="fw-bold mb-3">Síguenos</h5>
        <div class="d-flex gap-3 fs-5">
          <a *ngIf="store?.facebookUrl" [href]="store?.facebookUrl" target="_blank" class="footer-social" aria-label="Facebook">
            <i class="bi bi-facebook"></i>
          </a>
          <a *ngIf="store?.instagramUrl" [href]="store?.instagramUrl" target="_blank" class="footer-social" aria-label="Instagram">
            <i class="bi bi-instagram"></i>
          </a>
          <a *ngIf="store?.tiktokUrl" [href]="store?.tiktokUrl" target="_blank" class="footer-social" aria-label="TikTok">
            <i class="bi bi-tiktok"></i>
          </a>
          <a *ngIf="store?.whatsappUrl" [href]="store?.whatsappUrl" target="_blank" class="footer-social" aria-label="WhatsApp">
            <i class="bi bi-whatsapp"></i>
          </a>
        </div>
      </div>
    </div>

    <hr class="border-secondary opacity-25 my-4" />

    <p class="text-center text-secondary mb-0 small">
      &copy; {{ currentYear }} {{ store?.name || 'Marketflow' }}. Todos los derechos reservados.
    </p>
  </div>
</footer>
