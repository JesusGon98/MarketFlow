<div class="container py-4">
  <h1 class="h3 fw-bold mb-4">Catálogo de productos</h1>

  <div class="row g-3 align-items-center mb-4">
    <div class="col-12 col-md-6">
      <app-search-box placeholder="Buscar productos..." (search)="onSearch($event)"></app-search-box>
    </div>
    <div class="col-12 col-md-6">
      <select class="form-select" [ngModel]="selectedCategoryId" (ngModelChange)="onCategoryChange($event)">
        <option value="">Todas las categorías</option>
        <option *ngFor="let category of categories" [value]="category.id">{{ category.name }}</option>
      </select>
    </div>
  </div>

  <app-loading-spinner *ngIf="loading"></app-loading-spinner>

  <div class="alert alert-danger" *ngIf="error && !loading">
    No se pudo conectar con el servidor. Verifica que la API esté disponible.
  </div>

  <div class="alert alert-info" *ngIf="!loading && !error && products.length === 0">
    No se encontraron productos con los filtros seleccionados.
  </div>

  <div class="row g-3" *ngIf="!loading && !error">
    <div class="col-6 col-md-4 col-lg-3" *ngFor="let product of products">
      <app-product-card [product]="product" (addToCart)="onAddToCart($event)"></app-product-card>
    </div>
  </div>
</div>
