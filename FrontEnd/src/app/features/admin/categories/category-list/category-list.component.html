<div class="d-flex justify-content-between align-items-center mb-4">
  <h1 class="h3 fw-bold mb-0">Categorías</h1>
  <a routerLink="/admin/categories/new" class="btn btn-primary">
    <i class="bi bi-plus-lg me-1"></i>Nueva categoría
  </a>
</div>

<app-loading-spinner *ngIf="loading"></app-loading-spinner>

<div class="alert alert-danger" *ngIf="error && !loading">
  No se pudo conectar con el servidor. Verifica que la API esté disponible.
</div>

<div class="table-responsive" *ngIf="!loading && !error">
  <table class="table table-hover align-middle">
    <thead>
      <tr>
        <th>Nombre</th>
        <th>Descripción</th>
        <th>Estado</th>
        <th class="text-end">Acciones</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let category of categories">
        <td>{{ category.name }}</td>
        <td>{{ category.description || '-' }}</td>
        <td>
          <span class="badge" [class.text-bg-success]="category.active" [class.text-bg-secondary]="!category.active">
            {{ category.active ? 'Activa' : 'Inactiva' }}
          </span>
        </td>
        <td class="text-end">
          <a [routerLink]="['/admin/categories', category.id, 'edit']" class="btn btn-sm btn-outline-primary me-2">
            <i class="bi bi-pencil"></i>
          </a>
          <button type="button" class="btn btn-sm btn-outline-danger" (click)="confirmDelete(category)">
            <i class="bi bi-trash"></i>
          </button>
        </td>
      </tr>
      <tr *ngIf="categories.length === 0">
        <td colspan="4" class="text-center text-muted">No hay categorías registradas.</td>
      </tr>
    </tbody>
  </table>
</div>

<app-confirm-dialog
  title="Eliminar categoría"
  [message]="'¿Deseas eliminar la categoría \'' + (categoryToDelete?.name || '') + '\'?'"
  [visible]="!!categoryToDelete"
  (confirm)="deleteCategory()"
  (cancel)="cancelDelete()"
></app-confirm-dialog>
