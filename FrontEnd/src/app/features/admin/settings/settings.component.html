<h1 class="h3 fw-bold mb-4">Configuración de la tienda</h1>

<app-loading-spinner *ngIf="loading"></app-loading-spinner>

<div class="alert alert-danger" *ngIf="error && !loading">
  No se pudo conectar con el servidor. Verifica que la API esté disponible.
</div>

<form [formGroup]="form" (ngSubmit)="onSubmit()" *ngIf="!loading" class="card shadow-sm">
  <div class="card-body">
    <h2 class="h6 fw-bold mb-3">Información general</h2>
    <div class="row g-3 mb-4">
      <div class="col-12 col-md-6">
        <label class="form-label">Nombre del negocio</label>
        <input type="text" class="form-control" formControlName="name" />
      </div>
      <div class="col-12 col-md-6">
        <label class="form-label">Teléfono</label>
        <input type="text" class="form-control" formControlName="phone" />
      </div>
      <div class="col-12 col-md-6">
        <label class="form-label">Correo electrónico</label>
        <input type="email" class="form-control" formControlName="email" />
      </div>
      <div class="col-12 col-md-6">
        <label class="form-label">Dirección</label>
        <input type="text" class="form-control" formControlName="address" />
      </div>
      <div class="col-12">
        <label class="form-label">Horarios</label>
        <input type="text" class="form-control" formControlName="schedule" placeholder="Lun - Sáb: 9:00 - 19:00" />
      </div>
    </div>

    <h2 class="h6 fw-bold mb-3">Imagen corporativa</h2>
    <div class="row g-3 mb-4">
      <div class="col-12">
        <label class="form-label">Logo (URL)</label>
        <input type="text" class="form-control" formControlName="logoUrl" />
      </div>
      <div class="col-6 col-md-3">
        <label class="form-label">Color primario</label>
        <input type="color" class="form-control form-control-color w-100" formControlName="primaryColor" />
      </div>
      <div class="col-6 col-md-3">
        <label class="form-label">Color secundario</label>
        <input type="color" class="form-control form-control-color w-100" formControlName="secondaryColor" />
      </div>
    </div>

    <h2 class="h6 fw-bold mb-3">Redes sociales</h2>
    <div class="row g-3 mb-4">
      <div class="col-12 col-md-6">
        <label class="form-label"><i class="bi bi-facebook me-1"></i>Facebook</label>
        <input type="text" class="form-control" formControlName="facebookUrl" />
      </div>
      <div class="col-12 col-md-6">
        <label class="form-label"><i class="bi bi-instagram me-1"></i>Instagram</label>
        <input type="text" class="form-control" formControlName="instagramUrl" />
      </div>
      <div class="col-12 col-md-6">
        <label class="form-label"><i class="bi bi-tiktok me-1"></i>TikTok</label>
        <input type="text" class="form-control" formControlName="tiktokUrl" />
      </div>
      <div class="col-12 col-md-6">
        <label class="form-label"><i class="bi bi-whatsapp me-1"></i>WhatsApp</label>
        <input type="text" class="form-control" formControlName="whatsappUrl" />
      </div>
    </div>

    <div class="alert alert-success" *ngIf="saved">Configuración guardada correctamente.</div>

    <button type="submit" class="btn btn-primary" [disabled]="saving">
      <span class="spinner-border spinner-border-sm me-2" *ngIf="saving"></span>
      Guardar cambios
    </button>
  </div>
</form>
