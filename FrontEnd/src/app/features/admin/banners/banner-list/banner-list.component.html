<div class="d-flex justify-content-between align-items-center mb-4">
  <h1 class="h3 fw-bold mb-0">Banners</h1>
  <a routerLink="/admin/banners/new" class="btn btn-primary">
    <i class="bi bi-plus-lg me-1"></i>Nuevo banner
  </a>
</div>

<app-loading-spinner *ngIf="loading"></app-loading-spinner>

<div class="alert alert-danger" *ngIf="error && !loading">
  No se pudo conectar con el servidor. Verifica que la API esté disponible.
</div>

<div class="table-responsive" *ngIf="!loading && !error">
  <table class="table table-hover align-middle">
    <thead>
      <tr>
        <th>Imagen</th>
        <th>Título</th>
        <th>Orden</th>
        <th>Estado</th>
        <th class="text-end">Acciones</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let banner of banners">
        <td>
          <img [src]="banner.imageUrl" [alt]="banner.title" class="rounded" width="80" height="40" style="object-fit: cover" />
        </td>
        <td>{{ banner.title }}</td>
        <td>{{ banner.displayOrder }}</td>
        <td>
          <span class="badge" [class.text-bg-success]="banner.active" [class.text-bg-secondary]="!banner.active">
            {{ banner.active ? 'Activo' : 'Inactivo' }}
          </span>
        </td>
        <td class="text-end">
          <a [routerLink]="['/admin/banners', banner.id, 'edit']" class="btn btn-sm btn-outline-primary me-2">
            <i class="bi bi-pencil"></i>
          </a>
          <button type="button" class="btn btn-sm btn-outline-danger" (click)="confirmDelete(banner)">
            <i class="bi bi-trash"></i>
          </button>
        </td>
      </tr>
      <tr *ngIf="banners.length === 0">
        <td colspan="5" class="text-center text-muted">No hay banners registrados.</td>
      </tr>
    </tbody>
  </table>
</div>

<app-confirm-dialog
  title="Eliminar banner"
  [message]="'¿Deseas eliminar el banner \'' + (bannerToDelete?.title || '') + '\'?'"
  [visible]="!!bannerToDelete"
  (confirm)="deleteBanner()"
  (cancel)="cancelDelete()"
></app-confirm-dialog>
