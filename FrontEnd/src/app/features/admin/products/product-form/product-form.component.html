<div class="d-flex justify-content-between align-items-center mb-4">
  <h1 class="h3 fw-bold mb-0">{{ isEditMode ? 'Editar producto' : 'Nuevo producto' }}</h1>
  <button type="button" class="btn btn-outline-secondary" (click)="onCancel()">
    <i class="bi bi-arrow-left me-1"></i>Volver
  </button>
</div>

<app-loading-spinner *ngIf="loading"></app-loading-spinner>

<div class="alert alert-danger" *ngIf="error && !loading">
  No se pudo conectar con el servidor. Verifica que la API esté disponible.
</div>

<form [formGroup]="form" (ngSubmit)="onSubmit()" *ngIf="!loading" class="card shadow-sm">
  <div class="card-body">
    <div class="row g-3">
      <div class="col-12 col-md-8">
        <label class="form-label">Nombre</label>
        <input type="text" class="form-control" formControlName="name" />
        <div class="invalid-feedback d-block" *ngIf="form.get('name')?.invalid && form.get('name')?.touched">
          El nombre es obligatorio (2-100 caracteres).
        </div>
      </div>

      <div class="col-12 col-md-4">
        <label class="form-label">Categoría</label>
        <select class="form-select" formControlName="categoryId">
          <option value="" disabled>Selecciona una categoría</option>
          <option *ngFor="let category of categories" [value]="category.id">{{ category.name }}</option>
        </select>
        <div class="invalid-feedback d-block" *ngIf="form.get('categoryId')?.invalid && form.get('categoryId')?.touched">
          Selecciona una categoría.
        </div>
      </div>

      <div class="col-12">
        <label class="form-label">Descripción</label>
        <textarea class="form-control" rows="3" formControlName="description"></textarea>
      </div>

      <div class="col-6 col-md-3">
        <label class="form-label">Precio</label>
        <input type="number" class="form-control" formControlName="price" min="0" step="0.01" />
        <div class="invalid-feedback d-block" *ngIf="form.get('price')?.invalid && form.get('price')?.touched">
          El precio debe ser mayor o igual a 0.
        </div>
      </div>

      <div class="col-6 col-md-3">
        <label class="form-label">Stock</label>
        <input type="number" class="form-control" formControlName="stock" min="0" step="1" />
        <div class="invalid-feedback d-block" *ngIf="form.get('stock')?.invalid && form.get('stock')?.touched">
          El stock debe ser mayor o igual a 0.
        </div>
      </div>

      <div class="col-12 col-md-6">
        <label class="form-label">Imagen (URL)</label>
        <input type="text" class="form-control" formControlName="imageUrl" />
      </div>

      <div class="col-12">
        <div class="form-check form-switch">
          <input type="checkbox" class="form-check-input" id="active" formControlName="active" />
          <label class="form-check-label" for="active">Producto activo</label>
        </div>
      </div>
    </div>
  </div>

  <div class="card-footer d-flex justify-content-end gap-2">
    <button type="button" class="btn btn-outline-secondary" (click)="onCancel()">Cancelar</button>
    <button type="submit" class="btn btn-primary" [disabled]="saving">
      <span class="spinner-border spinner-border-sm me-2" *ngIf="saving"></span>
      {{ isEditMode ? 'Guardar cambios' : 'Crear producto' }}
    </button>
  </div>
</form>
