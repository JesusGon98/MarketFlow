<div class="card mb-4">
  <div class="card-header bg-light d-flex align-items-center gap-2">
    <i class="bi bi-shop text-secondary"></i>
    <h6 class="mb-0">Identidad de la tienda</h6>
  </div>

  <div class="card-body d-flex flex-column gap-3">
    <div class="d-flex align-items-center gap-3" *ngIf="editedLogoUrl">
      <img [src]="editedLogoUrl" alt="Logo" height="48" class="rounded" />
    </div>

    <div>
      <label class="form-label">Nombre de la tienda</label>
      <input type="text" class="form-control" [(ngModel)]="editedName" placeholder="Marketflow" />
    </div>

    <div>
      <label class="form-label">URL del logo</label>
      <input type="text" class="form-control" [(ngModel)]="editedLogoUrl" placeholder="https://..." />
    </div>
  </div>

  <div class="card-footer d-flex justify-content-end">
    <button type="button" class="btn btn-primary" (click)="onSave()">
      <i class="bi bi-check-lg me-1"></i>Guardar
    </button>
  </div>
</div>
