<div class="container py-4">
  <h1 class="h3 fw-bold mb-4">Categorías</h1>

  <app-loading-spinner *ngIf="loading"></app-loading-spinner>

  <div class="alert alert-danger" *ngIf="error && !loading">
    No se pudo conectar con el servidor. Verifica que la API esté disponible.
  </div>

  <div class="alert alert-info" *ngIf="!loading && !error && categories.length === 0">
    No hay categorías disponibles por el momento.
  </div>

  <div class="row g-3" *ngIf="!loading && !error && categories.length > 0">
    <div class="col-6 col-md-3" *ngFor="let category of categories">
      <app-category-card [category]="category"></app-category-card>
    </div>
  </div>
</div>
