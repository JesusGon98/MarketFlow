<div class="card h-100 shadow-sm product-card">
  <a [routerLink]="['/products', product.id]" class="text-decoration-none">
    <img
      [src]="product.imageUrl || 'https://placehold.co/400x300?text=Sin+imagen'"
      class="card-img-top"
      [alt]="product.name"
    />
  </a>
  <div class="card-body d-flex flex-column">
    <h6 class="card-title text-truncate" [title]="product.name">
      <a [routerLink]="['/products', product.id]" class="text-decoration-none text-dark">{{ product.name }}</a>
    </h6>

    <p class="card-text text-muted small mb-2" *ngIf="product.category">{{ product.category.name }}</p>

    <div class="mt-auto d-flex align-items-center justify-content-between">
      <span class="fw-bold fs-5 text-primary">{{ product.price | currencyMxn }}</span>

      <span class="badge" [class.bg-success]="product.stock > 0" [class.bg-secondary]="product.stock === 0">
        {{ product.stock > 0 ? 'En stock' : 'Agotado' }}
      </span>
    </div>

    <button
      type="button"
      class="btn btn-primary btn-sm mt-3"
      [disabled]="product.stock === 0"
      (click)="onAddToCart()"
    >
      <i class="bi bi-cart-plus me-1"></i>Agregar al carrito
    </button>
  </div>
</div>
