<div class="modal-backdrop fade show" *ngIf="visible"></div>

<div class="modal fade" [class.show]="visible" [style.display]="visible ? 'block' : 'none'" tabindex="-1" *ngIf="visible">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">{{ title }}</h5>
        <button type="button" class="btn-close" aria-label="Cerrar" (click)="close()"></button>
      </div>
      <div class="modal-body text-center">
        <img [src]="src" [alt]="title" class="img-fluid" />
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline-secondary" (click)="close()">
          <i class="bi bi-x-lg me-1"></i>Cerrar
        </button>
      </div>
    </div>
  </div>
</div>
