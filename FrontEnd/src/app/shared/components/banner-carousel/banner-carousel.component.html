<div id="bannerCarousel" class="carousel slide shadow-sm" data-bs-ride="carousel" *ngIf="banners.length">
  <div class="carousel-indicators">
    <button
      *ngFor="let banner of banners; let i = index"
      type="button"
      data-bs-target="#bannerCarousel"
      [attr.data-bs-slide-to]="i"
      [class.active]="i === 0"
      [attr.aria-current]="i === 0 ? 'true' : null"
      [attr.aria-label]="'Slide ' + (i + 1)"
    ></button>
  </div>

  <div class="carousel-inner">
    <div class="carousel-item" *ngFor="let banner of banners; let i = index" [class.active]="i === 0">
      <img [src]="banner.imageUrl" class="d-block w-100 carousel-img" [alt]="banner.title" />
      <div class="carousel-caption d-none d-md-block">
        <h5>{{ banner.title }}</h5>
      </div>
    </div>
  </div>

  <button class="carousel-control-prev" type="button" data-bs-target="#bannerCarousel" data-bs-slide="prev">
    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Anterior</span>
  </button>
  <button class="carousel-control-next" type="button" data-bs-target="#bannerCarousel" data-bs-slide="next">
    <span class="carousel-control-next-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Siguiente</span>
  </button>
</div>
