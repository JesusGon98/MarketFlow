<a
  class="card text-center category-card text-decoration-none h-100 shadow-sm"
  [routerLink]="['/products']"
  [queryParams]="{ categoryId: category.id }"
  (click)="onSelect()"
>
  <div class="card-body d-flex flex-column align-items-center justify-content-center">
    <i class="bi bi-tag fs-1 text-primary mb-2"></i>
    <h6 class="card-title mb-1 text-dark">{{ category.name }}</h6>
    <p class="card-text small text-muted mb-0" *ngIf="category.description">{{ category.description }}</p>
  </div>
</a>
